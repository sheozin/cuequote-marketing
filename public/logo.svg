<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Icon: rounded square with CQ -->
  <rect x="2" y="6" width="48" height="48" rx="12" fill="url(#grad)"/>
  <text x="26" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#08172E">CQ</text>
  <!-- Wordmark -->
  <text x="62" y="42" font-family="system-ui, sans-serif" font-weight="800" font-size="36" fill="#08172E" letter-spacing="-1">CueQuote</text>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
  </defs>
</svg>
